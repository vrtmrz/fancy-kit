name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for octagonal-wheels tests
        run: npm exec --workspace octagonal-wheels -- playwright install --with-deps chromium

      - name: Check workspace
        run: npm run check:workspace

      - name: Run workspace tests
        run: npm run test:workspace

      - name: Build workspace packages
        run: npm run build:workspace

      - name: Build harness
        run: npm run build:harness

      - name: Verify package contents
        run: npm run pack:workspace
