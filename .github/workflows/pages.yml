name: Deploy Harness installer

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/pages.yml"
      - "site/**"
  release:
    types:
      - published
      - edited
      - deleted
  workflow_dispatch:

permissions:
  contents: read
  pages: read

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'release' || startsWith(github.event.release.tag_name, 'harness-')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out the installer site
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          persist-credentials: false

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Assemble the installer and published Harness bundles
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pages_dir="$RUNNER_TEMP/fancy-kit-pages"
          mkdir -p "$pages_dir"
          cp -R site/. "$pages_dir/"

          mapfile -t harness_tags < <(
            gh release list \
              --repo "$GITHUB_REPOSITORY" \
              --limit 1000 \
              --json tagName,isDraft \
              --jq '.[] | select(.isDraft == false and (.tagName | startswith("harness-"))) | .tagName'
          )
          for tag in "${harness_tags[@]}"; do
            if [[ ! "$tag" =~ ^harness-[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
              echo "Refusing unexpected Harness release tag: $tag" >&2
              exit 1
            fi
            version="${tag#harness-}"
            release_dir="$pages_dir/harness/releases/$tag"
            mkdir -p "$release_dir"
            gh release download "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern "fancy-kit-harness-$version-screwdriver.md" \
              --dir "$release_dir"
          done

      - name: Upload the GitHub Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: ${{ runner.temp }}/fancy-kit-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
